<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Card</title>
  <link rel="stylesheet" href="profile.css">
</head>
<body>
  <article data-testid="test-profile-card" class="card">
    <figure class="avatar-container">
      <img src="https://via.placeholder.com/150" alt="Portrait of the user" data-testid="test-user-avatar" class="avatar">
      <figcaption>Profile Photo</figcaption>
    </figure>

    <div class="content">
      <header>
        <h2 data-testid="test-user-name" aria-label="Name">Fortune Adimchi</h2>
      </header>

      <p data-testid="test-user-bio">
        Frontend developer focused on building responsive, accessible web applications with modern technologies.
      </p>

      <p data-testid="test-user-time" id="time" aria-live="polite"></p>

      <nav data-testid="test-user-social-links" class="socials">
        <a href="https://twitter.com" target="_blank" rel="noopener noreferrer" data-testid="test-user-social-twitter">Twitter</a>
        <a href="https://github.com" target="_blank" rel="noopener noreferrer" data-testid="test-user-social-github">GitHub</a>
        <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer" data-testid="test-user-social-linkedin">LinkedIn</a>
      </nav>

      <section>
        <h3>Hobbies</h3>
        <ul data-testid="test-user-hobbies">
          <li>Coding</li>
          <li>Reading</li>
          <li>watching Animes</li>
        </ul>
      </section>

      <section>
        <h3>Dislikes</h3>
        <ul data-testid="test-user-dislikes">
          <li>Unnecessary Ads</li>
          <li>Spam emails</li>
          <li>Slow internet</li>
        </ul>
      </section>
    </div>
  </article>

  <script src="profile.js"></script>
</body>
</html>
